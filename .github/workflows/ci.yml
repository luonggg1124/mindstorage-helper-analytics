name: MindStorage Helper Analytics CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  syntax:
    name: Python syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Byte-compile sources
        run: python -m compileall -q src

  docker:
    name: Docker image
    needs: syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
          -t ghcr.io/luonggg1124/mindstorage-helper-analytics:latest .

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/luonggg1124/mindstorage-helper-analytics:latest